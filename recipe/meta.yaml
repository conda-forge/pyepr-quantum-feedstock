{% set name = "pyepr-quantum" %}
{% set version = "0.9.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/zlatko-minev/pyEPR/archive/{{ version }}.tar.gz
  sha256: 6a1572f7493fecdcdda5f0a0b2c2ed29ab0d5478fc4485a3f1c107bc6de893f6

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - addict
    - ipython >=7.0.0
    - matplotlib-base >=3.1.0
    - numpy >=1.15.0
    - pandas >=1.0.1
    - pint >=0.8
    - python >={{ python_min }}
    - qutip >=5.0.0
    - seaborn >=0.10.0
    - sphinx_rtd_theme >=0.4.0
    - scipy >=1.3.0
    - sympy >=1.3
    - xarray >=0.10.0

test:
  imports:
    - pyEPR

  commands:
    - pip check

  requires:
    - pip
    # Workaround for older version of sphinx_rtd_theme's conda-forge package
    # not specifying its dependencies properly and causing pip check to fail
    - sphinx_rtd_theme >=1.0.0
    - python {{ python_min }}

about:
  home: https://github.com/zlatko-minev/pyEPR
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Automated Python module for the design and quantization of Josephson quantum circuits
  doc_url: https://pyepr-docs.readthedocs.io/
  dev_url: https://github.com/zlatko-minev/pyEPR

extra:
  recipe-maintainers:
    - zlatko-minev
    - wshanks
