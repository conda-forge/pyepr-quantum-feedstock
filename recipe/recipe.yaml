schema_version: 1

context:
  version: "1.0.0"

package:
  name: pyepr-quantum
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyepr-quantum/pyepr_quantum-${{ version }}.tar.gz
  sha256: 63c4b032766db2168a4a300d7e49137c0adb57895784c8132354a0bc0c0bf127

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - addict
    - ipython >=7.0.0
    - matplotlib-base >=3.1.0
    - numpy >=1.15.0
    - pandas >=1.0.1
    - pint >=0.8
    - qutip >=5.0.0
    - scipy >=1.3.0
    - seaborn >=0.10.0
    - sympy >=1.3
    - xarray >=0.10.0

tests:
  - python:
      imports:
        - pyEPR
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python Energy-Participation-Ratio (EPR) package for quantum chip design
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/zlatko-minev/pyEPR
  documentation: https://pyepr-docs.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - wshanks
    - zlatko-minev
